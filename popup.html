<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    width: 300px; padding: 16px;
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    color: #1e293b;
  }
  .hdr { display: flex; align-items: center; gap: 10px; margin-bottom: 12px; }
  .hdr img { width: 28px; height: 28px; }
  .hdr h1 { font-size: 15px; font-weight: 600; }
  p { font-size: 13px; color: #64748b; line-height: 1.5; margin-bottom: 12px; }
  .btn {
    display: block; width: 100%; padding: 10px; text-align: center;
    background: #003a5d; color: white; border: none; border-radius: 6px;
    font-size: 14px; font-weight: 600; cursor: pointer; text-decoration: none;
    transition: background 0.15s;
  }
  .btn:hover { background: #00507a; }
  .btn-secondary {
    display: block; width: 100%; padding: 8px; text-align: center;
    background: none; color: #64748b; border: 1px solid #e2e8f0; border-radius: 6px;
    font-size: 13px; cursor: pointer; margin-top: 8px; text-decoration: none;
    transition: all 0.15s;
  }
  .btn-secondary:hover { border-color: #94a3b8; color: #1e293b; }
  .status { font-size: 12px; color: #10b981; margin-bottom: 8px; display: none; }
  .status.show { display: block; }
</style>
</head>
<body>
  <div class="hdr">
    <img src="icons/icon48.png" alt="">
    <h1>ASM Label Generator</h1>
  </div>
  <div class="status" id="status">✓ PDF detected in current tab</div>
  <p id="desc">Generate printable labels from Factory.app delivery dockets.</p>
  <a class="btn" id="mainBtn" href="#">Generate Labels from Current Tab</a>
  <a class="btn-secondary" id="openBtn" href="#">Open Label Generator</a>
  <script src="popup.js"></script>
</body>
</html>
